<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="static/styles/login.css" class="css">
</head>
<body>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <div id="flash-message">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}



    <div class="container">
        <h1>Login</h1>
        <form action="/verify" method="post">
            <p>Email Add:-</p> 
            <input type="email" name='email' required placeholder="abc@outlook.com"><br>
            <p>Password :-</p>
            <input type="password" name='password' required minimum="5" placeholder="aryan@3056" >
            <button type="submit" value="Login">Login</button><br>-
        </form>
        
        <a href="/">Don't have an account ? Register </a>
        <h2>Tic-Tac-Toe</h2>
    </div>
</body>
</html>
