<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registeration</title>
    <link rel="stylesheet" href="static/styles/register.css" class="css">
</head>
<body>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for message in messages %}
            <div id="flash-message">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}


    <div class="container">
        <h1>Registration</h1>
        <form action="/register" method="post">
            <p>Email Add:-</p> 
            <input type="email" name='email' required placeholder="abc@outlook.com"><br>
            <p>Password :-</p>
            <input type="password" name='password' required minimum="5" placeholder="atleast 5 characters" >
            <button type="submit" value="Register">Register</button><br>
        </form>
        
        <a href="/login">Already have account ? Login </a>
        <h2>Tic-Tac-Toe</h2>
    </div>
</body>
</html>
