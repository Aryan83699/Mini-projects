<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" class="css">
</head>
<body>

    <div class="navbar">
        <p>Rock Paper Scissor </p>
    </div>

    <div class="container">
        <div class="sub-container1">

            <div class="player">
                <div class="player-logo">
                    <img src="images/person2.png" alt="person" >
                </div>
                <p>Player</p>
                <p>Score : 0</p>
            </div>
            <div class="computer">
                <div class="computer-logo">
                    <img src="images/computer.jpg" alt="computer" >
                </div>
                <p>Computer</p>
                <p>Score : 0</p>
            </div>
        
            




        </div>
        <div class="sub-container2">
            <button>Play</button>
        </div>
        
    </div>


    <div class="choices">
        <div id="rock">
            <img src="images/Rock.jpg" alt="rock">
        </div>
        <div id="scissor">
            <img src="images/Scissor.jpg" alt="scissor">
        </div>
        <div id="paper">
            <img src="images/Paper.jpg" alt="paper">
        </div>
    </div>

<script src='script.js'></script>

</body>
</html>
